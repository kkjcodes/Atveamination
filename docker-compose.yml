services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atveadmin
      POSTGRES_PASSWORD: atveadmin
      POSTGRES_DB: atveanimation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atveadmin"]
      interval: 5s
      timeout: 5s
      retries: 5

  storage:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"   # Blob service
    command: azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck
    volumes:
      - azurite_data:/data

volumes:
  postgres_data:
  azurite_data:
